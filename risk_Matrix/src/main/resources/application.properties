spring.application.name=risk_Matrix
spring.datasource.url=jdbc:h2:file:./src/DB/DB
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate settings use 'validate' in production (see application-prod.properties)
spring.jpa.hibernate.ddl-auto=update
#spring.h2.console.enabled=true

# JWT secret MUST be provided via environment variable. No default startup fails if unset.
app.jwt.secret=${JWT_SECRET}
app.jwt.expirationMs=86400000
app.jwt.public.expirationMs=7200000
app.jwt.refresh.expirationMs=604800000

# Default admin account created on first startup. All three env vars are required  no defaults.
app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Cookie security  set COOKIE_SECURE=true in production (requires HTTPS)
app.cookie.secure=${COOKIE_SECURE:false}

# Trusted proxy IPs for X-Forwarded-For (comma-separated). Add your reverse-proxy IP here.
app.trusted.proxies=${TRUSTED_PROXIES:127.0.0.1,::1}

